<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณสารเคมีในบ่อเพาะเลี้ยงสัตว์น้ำ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header"> <h1> ระบบคำนวณการใช้สารเคมีในบ่อเพาะเลี้ยงสัตว์น้ำ</h1> <p>กรมประมง - Aquaculture Chemical Calculator</p> </div>

<div class="dashboard"> 

  <div class="card">

    <div class="card-title">
         ข้อมูลบ่อเพาะเลี้ยง
    </div>

    <label>รูปแบบบ่อ</label>
    <select id="pondType" onchange="changePondType()">
        <option>บ่อรูปสี่เหลี่ยม</option>
        <option>บ่อรูปทรงกลม</option>
        <option>บ่อรูปวงรี</option>
        <option>คำนวณจากพื้นที่ (ไร่)</option>
    </select>

    <label id="widthLabel">ความกว้าง (เมตร)</label>
    <input type="number" id="width">

    <label id="lengthLabel">ความยาว (เมตร)</label>
    <input type="number" id="length">

    <label id="depthLabel">ความลึก (เมตร)</label>
    <input type="number" id="depth">

    <div id="raiGroup" style="display:none;">
        <label>พื้นที่บ่อ (ไร่)</label>
        <input type="number" id="pondRai" step="0.01">
    </div>

    <button class="btn-water" onclick="calculateVolume()">
            คำนวณปริมาตรน้ำ
    </button>

    <div id="result" style="display:none;"></div>

</div>

    <div class="card">

    <div class="card-title">
         ข้อมูลสัตว์น้ำ
    </div>

    <label>น้ำหนักสัตว์รวม (กก.)</label>
    <input type="number" id="animalWeight">

</div>
<br>
       <div class="card chemical-card">

<div class="card-title">  ข้อมูลสารเคมี </div>

<label>วัตถุประสงค์</label>
<select id="objective" onchange="loadChemicals()">
    <option value="">-- เลือกวัตถุประสงค์ --</option>
</select>

<label>ชนิดสารเคมี</label>
<select id="chemical" onchange="loadChemicalInfo()">
    <option value="">-- เลือกสารเคมี --</option>
</select>
<label>อัตราการใช้ต่ำสุด</label>
<input type="text" id="minRate" readonly>

<label>อัตราการใช้สูงสุด</label>
<input type="text" id="maxRate" readonly>

<label>
    อัตราที่ใช้คำนวณ
    <span style="color:red;">* กรุณากรอกอัตราที่ต้องการใช้</span>
</label>

<input type="number"
    id="selectedRate"
    class="highlight-input"
    placeholder="กรอกอัตราที่ต้องการใช้"
    step="0.01">

<label>หน่วยความเข้มข้น</label>
<input type="text" id="unit" readonly>
<label>หน่วยที่ใช้</label>
<input type="text" id="useUnit" readonly>

<label>หน่วยผลลัพธ์</label>
<input type="text" id="resultUnit" readonly>
<button class="btn-chemical" onclick="calculateChemical()">
     คำนวณปริมาณสารเคมี
</button>

</div>

<div class="card result-card">

    <div class="card-title">
         ผลการคำนวณ
    </div>

    <div id="chemicalResult">
        กรุณากรอกข้อมูลและกดคำนวณ
    </div>

</div>

</div> 

</div> 

<script src="script.js"></script>

</body>
</html>
